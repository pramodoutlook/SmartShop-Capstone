name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Run tests
        run: npm test

      - name: Package application
        if: always()
        run: |
          mkdir -p artifacts
          if npm pack --pack-destination artifacts; then
            echo "npm pack succeeded"
          else
            echo "npm pack failed; continuing with fallback bundle"
          fi

          if [ -d coverage ]; then
            cp -R coverage artifacts/coverage
          fi

          tar \
            --exclude='./.git' \
            --exclude='./node_modules' \
            --exclude='./artifacts' \
            -czf "artifacts/smartshop-lite-${{ github.sha }}-source.tar.gz" .

          {
            echo "run_id=${{ github.run_id }}"
            echo "run_number=${{ github.run_number }}"
            echo "sha=${{ github.sha }}"
            echo "ref=${{ github.ref }}"
          } > artifacts/build-info.txt

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smartshop-lite-${{ github.sha }}
          path: |
            artifacts/*.tgz
            artifacts/*.tar.gz
            artifacts/build-info.txt
            artifacts/coverage
          if-no-files-found: error
          retention-days: 14