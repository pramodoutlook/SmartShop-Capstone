<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Ceramic coffee mug illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff6ec"/>
      <stop offset="100%" stop-color="#fce8d5"/>
    </linearGradient>
    <linearGradient id="mug" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#f4e8d9"/>
    </linearGradient>
    <linearGradient id="coffee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3523"/>
      <stop offset="100%" stop-color="#3b2216"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="180%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#7a5538" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>

  <ellipse cx="600" cy="745" rx="300" ry="48" fill="#e8c9ad" opacity="0.6"/>

  <g filter="url(#softShadow)">
    <ellipse cx="540" cy="350" rx="245" ry="78" fill="#f8efe4" stroke="#d9b89a" stroke-width="10"/>
    <rect x="295" y="350" width="490" height="315" rx="40" ry="40" fill="url(#mug)" stroke="#d9b89a" stroke-width="10"/>
    <ellipse cx="540" cy="665" rx="245" ry="78" fill="#f0e0cf" stroke="#d9b89a" stroke-width="10"/>

    <ellipse cx="540" cy="352" rx="208" ry="58" fill="url(#coffee)"/>

    <path d="M780 420 C930 360, 970 645, 790 628" fill="none" stroke="#d9b89a" stroke-width="40" stroke-linecap="round"/>
    <path d="M788 430 C895 390, 915 600, 795 592" fill="none" stroke="#fff8ef" stroke-width="18" stroke-linecap="round"/>
  </g>

  <path d="M460 252 C430 214, 452 176, 432 142" stroke="#d6a885" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M540 236 C512 196, 538 162, 520 124" stroke="#d6a885" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M620 252 C590 212, 616 174, 598 136" stroke="#d6a885" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.7"/>
